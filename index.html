<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noci's Book Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #f7e1e8;
    --rose: #e8a0b4;
    --deep-rose: #c95c7b;
    --mauve: #b5728a;
    --lavender: #e8dff0;
    --lilac: #c9b8e0;
    --soft-purple: #9b7ec0;
    --cream: #fdf6f9;
    --white: #ffffff;
    --text: #3d2535;
    --text-soft: #8c6070;
    --text-faded: #c4a0b0;
    --shadow: rgba(180,100,130,0.12);
    --shadow-hover: rgba(180,100,130,0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 10%, rgba(232,160,180,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 5%, rgba(201,184,224,0.22) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 95%, rgba(247,225,232,0.3) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.22;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.22; }
    90%  { opacity: 0.22; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }
  @keyframes sway {
    from { transform: scale(1) rotate(-1deg); }
    to   { transform: scale(1.04) rotate(1deg); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 52px 24px 40px;
    background: linear-gradient(180deg, rgba(247,225,232,0.9) 0%, rgba(253,246,249,0) 100%);
  }
  .header-deco {
    font-size: 26px;
    margin-bottom: 8px;
    letter-spacing: 8px;
    opacity: 0.65;
    display: block;
    animation: sway 4s ease-in-out infinite alternate;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 8vw, 70px);
    font-weight: 300;
    color: var(--deep-rose);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }
  h1 em { font-style: italic; font-weight: 300; color: var(--mauve); }
  .tagline {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-faded);
    font-weight: 400;
    margin-bottom: 32px;
  }

  /* ── Stats ── */
  .stats-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .stat-pill {
    background: var(--white);
    border: 1.5px solid rgba(232,160,180,0.4);
    border-radius: 50px;
    padding: 10px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    box-shadow: 0 2px 12px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    min-width: 90px;
  }
  .stat-pill:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow-hover); }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--deep-rose);
    line-height: 1;
  }
  .stat-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-faded); font-weight: 600; }

  /* ── Main ── */
  .main { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── Add Card ── */
  .add-card {
    background: var(--white);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 36px;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1.5px solid rgba(232,160,180,0.25);
    position: relative;
    overflow: hidden;
  }
  .add-card::before {
    content: '🌸';
    position: absolute;
    top: -8px; right: 20px;
    font-size: 52px;
    opacity: 0.08;
    transform: rotate(15deg);
  }
  .add-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rose), var(--lilac), var(--rose));
    border-radius: 24px 24px 0 0;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--mauve);
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faded); font-weight: 600; }
  input[type="text"], input[type="number"] {
    background: var(--blush);
    border: 1.5px solid transparent;
    border-radius: 12px;
    padding: 11px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
  }
  input:focus { border-color: var(--rose); background: var(--white); }
  input::placeholder { color: var(--text-faded); font-weight: 400; }

  /* ── Stars ── */
  .slider-wrap {
    background: var(--blush);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .slider-info { display: flex; align-items: center; gap: 12px; }
  .slider-hearts { font-size: 22px; letter-spacing: 3px; color: var(--deep-rose); min-width: 130px; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--deep-rose) var(--pct, 0%), rgba(228,180,196,0.35) var(--pct, 0%));
    outline: none;
    cursor: pointer;
    border: none;
    padding: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--white);
    border: 3px solid var(--deep-rose);
    box-shadow: 0 2px 8px rgba(201,92,123,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: grab;
  }
  input[type="range"]::-webkit-slider-thumb:active {
    transform: scale(1.2);
    box-shadow: 0 4px 14px rgba(201,92,123,0.5);
    cursor: grabbing;
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--white);
    border: 3px solid var(--deep-rose);
    box-shadow: 0 2px 8px rgba(201,92,123,0.35);
    cursor: grab;
  }
  .rating-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-faded);
    margin-left: 8px;
    min-width: 80px;
  }

  /* ── Add Button ── */
  .add-btn {
    margin-top: 22px;
    width: 100%;
    background: linear-gradient(135deg, var(--deep-rose), var(--mauve));
    color: var(--white);
    border: none;
    border-radius: 50px;
    padding: 14px 28px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(180,80,110,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(180,80,110,0.4); }
  .add-btn:active { transform: scale(0.98); }

  /* ── Library header ── */
  .lib-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
  .lib-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: var(--mauve); display: flex; align-items: center; gap: 8px; }
  .sort-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .sort-btn {
    background: var(--white);
    border: 1.5px solid rgba(232,160,180,0.4);
    color: var(--text-soft);
    border-radius: 50px;
    padding: 5px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sort-btn:hover, .sort-btn.active {
    background: linear-gradient(135deg, var(--rose), var(--lilac));
    border-color: transparent;
    color: var(--white);
    box-shadow: 0 2px 10px var(--shadow);
  }

  /* ── Book Cards ── */
  .book-list { display: flex; flex-direction: column; gap: 14px; }
  .book-card {
    background: var(--white);
    border-radius: 20px;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 14px var(--shadow);
    border: 1.5px solid rgba(232,160,180,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }
  .book-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, var(--rose), var(--lilac));
    border-radius: 20px 0 0 20px;
  }
  .book-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px var(--shadow-hover); }
  .book-icon { font-size: 32px; flex-shrink: 0; }
  .book-body { flex: 1; min-width: 0; }
  .book-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .book-author { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--text-soft); margin-bottom: 8px; }
  .book-chips { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .chip { border-radius: 50px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
  .chip-stars { background: rgba(201,92,123,0.1); color: var(--deep-rose); letter-spacing: 1px; }
  .chip-pages { background: var(--lavender); color: var(--soft-purple); }
  .chip-date { background: rgba(200,200,200,0.15); color: var(--text-faded); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 12px; }
  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-faded);
    font-size: 18px;
    padding: 6px;
    border-radius: 50%;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .delete-btn:hover { background: rgba(201,92,123,0.1); color: var(--deep-rose); }

  /* ── Empty ── */
  .empty { text-align: center; padding: 70px 20px; color: var(--text-faded); }
  .empty-emoji { font-size: 56px; margin-bottom: 14px; display: block; animation: sway 3s ease-in-out infinite alternate; }
  .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-style: italic; color: var(--mauve); margin-bottom: 6px; }
  .empty-sub { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }

  /* ── Banner ── */
  .pages-banner {
    background: linear-gradient(135deg, var(--deep-rose), var(--soft-purple));
    border-radius: 16px;
    padding: 16px 24px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--white);
    box-shadow: 0 4px 20px rgba(155,80,150,0.3);
  }
  .banner-num { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; line-height: 1; }
  .banner-text { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.85; font-weight: 600; }

  @media (max-width: 580px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    header { padding: 36px 16px 28px; }
    .add-card { padding: 22px 18px; }
    .book-card { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <span class="header-deco">🌸 ✦ 🌸</span>
  <h1>Noci's <em>Book Reviews</em></h1>
  <div class="tagline">every page, every story, every feeling</div>
  <div class="stats-row">
    <div class="stat-pill">
      <span class="stat-num" id="total-books">0</span>
      <span class="stat-label">Books</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" id="total-pages">0</span>
      <span class="stat-label">Pages</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" id="avg-rating">—</span>
      <span class="stat-label">Avg Stars</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" id="fivestar">—</span>
      <span class="stat-label">Faves ♡</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="add-card">
    <div class="card-title">🌷 Add a new book</div>
    <div class="form-grid">
      <div class="field full">
        <label>Title</label>
        <input type="text" id="inp-title" placeholder="What did you just finish? ✨" autocomplete="off">
      </div>
      <div class="field">
        <label>Author</label>
        <input type="text" id="inp-author" placeholder="Written by..." autocomplete="off">
      </div>
      <div class="field">
        <label>Pages Read</label>
        <input type="number" id="inp-pages" placeholder="e.g. 342" min="1">
      </div>
      <div class="field full">
        <label>Your Rating</label>
        <div class="slider-wrap">
          <input type="range" id="rating-slider" min="0" max="5" step="0.25" value="0">
          <div class="slider-info">
            <span class="slider-hearts" id="slider-hearts">♡♡♡♡♡</span>
            <span class="rating-text" id="rating-display">drag to rate</span>
          </div>
        </div>
      </div>
    </div>
    <button class="add-btn" id="add-btn">🌸 Add to My Diary</button>
  </div>

  <div class="lib-header">
    <div class="lib-title">📚 My Library</div>
    <div class="sort-pills">
      <button class="sort-btn active" data-sort="date">Recent</button>
      <button class="sort-btn" data-sort="rating">Top Rated</button>
      <button class="sort-btn" data-sort="pages">Most Pages</button>
      <button class="sort-btn" data-sort="title">A–Z</button>
    </div>
  </div>

  <div class="book-list" id="book-list"></div>

  <div id="empty" class="empty">
    <span class="empty-emoji">🌸</span>
    <div class="empty-title">Your diary is empty, darling</div>
    <div class="empty-sub">Add your first book above</div>
  </div>

  <div id="pages-banner" style="display:none" class="pages-banner">
    <span>📖</span>
    <div>
      <div class="banner-num" id="banner-pages">0</div>
      <div class="banner-text">total pages read</div>
    </div>
  </div>
</div>

<script>
  // Floating petals
  const emojis = ['🌸','🌷','🌺','🌼','✿'];
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = `left:${Math.random()*100}vw;font-size:${12+Math.random()*10}px;animation-duration:${12+Math.random()*16}s;animation-delay:${Math.random()*15}s`;
    document.body.appendChild(el);
  }

  const STORAGE_KEY = 'reading_diary_v2';
  let books = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let selectedRating = 0;
  let sortMode = 'date';
  const bookIcons = ['📖','📗','📘','📙','📕','🔖'];

  // Slider rating
  const slider = document.getElementById('rating-slider');
  const ratingDisplay = document.getElementById('rating-display');
  const sliderHearts = document.getElementById('slider-hearts');

  function heartsDisplay(r) {
    let s = '';
    for (let i = 1; i <= 5; i++) {
      if (r >= i) s += '♥';
      else if (r >= i - 0.25) s += '¾';
      else if (r >= i - 0.5) s += '½';
      else if (r >= i - 0.75) s += '¼';
      else s += '♡';
    }
    return s;
  }

  function updateSlider(r) {
    selectedRating = r;
    const pct = (r / 5) * 100;
    slider.style.setProperty('--pct', pct + '%');
    sliderHearts.textContent = heartsDisplay(r);
    const label = r === 0 ? 'drag to rate'
      : r <= 1   ? `${r} / 5 — not for me`
      : r <= 2   ? `${r} / 5 — it was okay`
      : r <= 3   ? `${r} / 5 — pretty good`
      : r <= 4   ? `${r} / 5 — really loved it!`
      : r < 5    ? `${r} / 5 — almost perfect!`
      :            `5 / 5 — absolutely obsessed!`;
    ratingDisplay.textContent = label;
  }

  slider.addEventListener('input', () => updateSlider(parseFloat(slider.value)));
  updateSlider(0);

  function starsDisplay(r) {
    let s = '';
    for (let i = 1; i <= 5; i++) {
      if (r >= i) s += '♥';
      else if (r >= i - 0.5) s += '½';
      else s += '♡';
    }
    return s;
  }

  function getSorted() {
    const copy = [...books];
    if (sortMode === 'date')   return copy.reverse();
    if (sortMode === 'rating') return copy.sort((a,b) => b.rating - a.rating);
    if (sortMode === 'pages')  return copy.sort((a,b) => b.pages - a.pages);
    if (sortMode === 'title')  return copy.sort((a,b) => a.title.localeCompare(b.title));
    return copy;
  }

  function updateStats() {
    const total = books.length;
    const pages = books.reduce((s,b) => s + b.pages, 0);
    const rated = books.filter(b => b.rating > 0);
    const avg = rated.length ? (rated.reduce((s,b) => s + b.rating, 0) / rated.length).toFixed(1) : '—';
    const fives = books.filter(b => b.rating === 5).length;
    document.getElementById('total-books').textContent = total;
    document.getElementById('total-pages').textContent = pages.toLocaleString();
    document.getElementById('avg-rating').textContent = avg;
    document.getElementById('fivestar').textContent = fives || '—';
    const banner = document.getElementById('pages-banner');
    if (total > 0) { banner.style.display = 'flex'; document.getElementById('banner-pages').textContent = pages.toLocaleString(); }
    else banner.style.display = 'none';
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render() {
    const list = document.getElementById('book-list');
    const empty = document.getElementById('empty');
    const sorted = getSorted();
    if (!sorted.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      list.innerHTML = sorted.map((b, idx) => {
        const icon = bookIcons[idx % bookIcons.length];
        const date = new Date(b.date).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        return `
          <div class="book-card">
            <div class="book-icon">${icon}</div>
            <div class="book-body">
              <div class="book-title">${esc(b.title)}</div>
              ${b.author ? `<div class="book-author">by ${esc(b.author)}</div>` : ''}
              <div class="book-chips">
                ${b.rating > 0 ? `<span class="chip chip-stars">${starsDisplay(b.rating)} ${b.rating}</span>` : ''}
                <span class="chip chip-pages">${b.pages.toLocaleString()} pages</span>
                <span class="chip chip-date">${date}</span>
              </div>
            </div>
            <button class="delete-btn" onclick="deleteBook('${b.id}')" title="Remove">✕</button>
          </div>`;
      }).join('');
    }
    updateStats();
  }

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }

  document.getElementById('add-btn').addEventListener('click', () => {
    const title = document.getElementById('inp-title').value.trim();
    const author = document.getElementById('inp-author').value.trim();
    const pages = parseInt(document.getElementById('inp-pages').value);
    if (!title) { document.getElementById('inp-title').focus(); return; }
    if (!pages || pages < 1) { document.getElementById('inp-pages').focus(); return; }
    books.push({ id: Date.now().toString(), title, author, pages, rating: selectedRating, date: new Date().toISOString() });
    save(); render();
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-author').value = '';
    document.getElementById('inp-pages').value = '';
    selectedRating = 0;
    slider.value = 0;
    updateSlider(0);
    document.getElementById('inp-title').focus();
  });

  ['inp-title','inp-author','inp-pages'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('add-btn').click(); });
  });

  window.deleteBook = id => { books = books.filter(b => b.id !== id); save(); render(); };

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sortMode = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  render();
</script>
</body>
